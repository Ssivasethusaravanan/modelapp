name: team_management_app
description: A production-ready team management app with high security and premium aesthetics.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- State Management (BLoC) ---
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  hydrated_bloc: any
  replay_bloc: any
  bloc_concurrency: any
  equatable: ^2.0.5

  # --- Dependency Injection ---
  get_it: ^9.2.1
  injectable: ^2.5.0

  # --- Navigation ---
  go_router: ^17.2.0

  # --- Networking ---
  dio: ^5.7.0
  retrofit: ^4.1.0
  connectivity_plus: ^6.1.1

  # --- Local Storage ---
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0
  hive_flutter: ^1.1.0

  # --- UI & Aesthetics ---
  flutter_svg: ^2.0.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  google_fonts: ^8.0.2
  glassmorphism: ^3.0.0
  animate_do: ^4.2.0
  mobile_scanner: ^5.1.0
  google_mlkit_barcode_scanning: ^0.12.0
  intl: ^0.19.0
  reactive_forms: ^17.0.0

  # --- Utilities ---
  freezed_annotation: ^3.1.0
  json_annotation: ^4.8.0
  dartz: ^0.10.1
  logger: ^2.0.0
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: any
  freezed: any
  json_serializable: any
  retrofit_generator: any
  injectable_generator: any
  bloc_test: any
  mocktail: ^1.0.4
  coverage: any
  very_good_analysis: any

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
